name: Checks

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Check English style
        run: npm run check:english-style

      - name: Build HonKit site
        run: npm run build:site

      - name: Check generated images
        run: npm run check:generated-images

      - name: Install codespell
        run: python3 -m pip install codespell

      - name: Check links
        run: npm run check:links

      - name: Check spelling
        run: npm run check:spelling
